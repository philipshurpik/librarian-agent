x-app: &app
  build: .
  env_file: .env
  environment:
    QDRANT_URL: http://qdrant:6333
  volumes:
    - ./data:/app/data
  depends_on:
    qdrant:
      condition: service_healthy

services:
  qdrant:
    image: qdrant/qdrant:v1.18.2  # keep the server minor in lockstep with the qdrant-client pin
    ports:
      - '6333:6333'
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ['CMD-SHELL', 'bash -c ":> /dev/tcp/127.0.0.1/6333" || exit 1']  # image ships no curl; TCP probe
      interval: 3s
      timeout: 2s
      retries: 20

  ingest:
    <<: *app
    command: python -m librarian.ingest
    restart: 'no'  # one-shot: populates the catalog, then exits; idempotent, so re-running on every `up` is free

  api:
    <<: *app
    ports:
      - '8000:8000'
    depends_on:  # merge keys don't deep-merge: restate qdrant alongside ingest
      qdrant:
        condition: service_healthy
      ingest:
        condition: service_completed_successfully  # api boots against a populated catalog (topic enum reads it at startup)
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s

volumes:
  qdrant_storage:
