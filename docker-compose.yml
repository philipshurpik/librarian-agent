services:
  qdrant:
    image: qdrant/qdrant:v1.18.2  # keep the server minor in lockstep with the qdrant-client pin
    ports:
      - '6333:6333'
    volumes:
      - qdrant_storage:/qdrant/storage

  api:
    build: .
    ports:
      - '8000:8000'
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s

volumes:
  qdrant_storage:
